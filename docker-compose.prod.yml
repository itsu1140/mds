services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        volumes:
            - mds-data:/data
        environment:
            - DATA_DIR=/data
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                - ROOT_PATH=${ROOT_PATH:-/}
        ports:
            - "50003:80"
        environment:
            - ROOT_PATH=${ROOT_PATH:-/}
        depends_on:
            - backend
        restart: unless-stopped

volumes:
    mds-data:
